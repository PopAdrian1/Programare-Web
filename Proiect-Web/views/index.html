<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orchard — Optimizare Genetică</title>
  <link rel="stylesheet" href="
  /style.css">
</head>

<body>
  <header>
    <div class="header-wordmark">
      <h1>Orchard</h1>
      <div class="header-sub">Algoritmi Genetici</div>
    </div>
  </header>

  <main>
    <div class="panel left-panel">
      <div class="panel-header">
        <span class="panel-title">Vizualizare livadă</span>
        <span class="panel-badge" id="result-badge">În așteptare</span>
      </div>
      <div class="image-wrapper">
        <img id="orchard-img" src="" alt="Livadă optimizată" />
        <div class="img-placeholder" id="img-placeholder">
          <svg class="placeholder-icon" width="50" height="50" viewBox="0 0 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="52" height="52" rx="2" stroke="#8c8c8c" stroke-width="1"/>
            <path d="M15 45 L29 20 L43 45" stroke="#8c8c8c" stroke-width="1"/>
          </svg>
          <div>
            <div class="placeholder-text">Rezultat indisponibil</div>
            <div class="placeholder-hint">Pornește generarea pentru vizualizare</div>
          </div>
        </div>
        <div class="scan-line"></div>
      </div>
      <div class="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span class="status-text" id="status-text">Sistem inactiv</span>
      </div>
    </div>
    <div class="panel right-panel">
      <div class="panel-header">
        <span class="panel-title">Parametri algoritm</span>
      </div>
      <div class="params-body">
        <div class="param-section">
          <div class="section-label">Populație</div>
          <div class="field"><label>Dimensiune</label><input type="number" id="pop-size" placeholder="100" /></div>
          <div class="field"><label>Generații</label><input type="number" id="generations" placeholder="500" /></div>
        </div>
        <div class="param-section">
          <div class="section-label">Operatori</div>
          <div class="field"><label>Mutație (%)</label><input type="number" id="mutation-rate" placeholder="5" /></div>
          <div class="field"><label>Încrucișare (%)</label><input type="number" id="crossover-rate" placeholder="80" /></div>
        </div>
      </div>
      <div class="action-area">
        <div class="gen-display" id="gen-display">
          <div class="gen-progress">
            <span class="gen-val" id="gen-val">0</span>
            <div class="gen-track"><div class="gen-fill" id="gen-fill"></div></div>
          </div>
        </div>
        <button class="btn-generate" id="start-btn" onclick="startGeneration()">
          <span id="btn-label">Execută Optimizarea</span>
        </button>
      </div>
    </div>
  </main>
</body>
</html>
